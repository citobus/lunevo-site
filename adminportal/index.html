<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lunevo Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="../media/favicon-32.png">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-page">
  <div class="login-shell">
    <div class="login-card">
      <div class="login-logo">
        <img src="../media/lunevo_logo_new.png" alt="lunevo" class="logo-img">
        <span class="login-brand">lunevo</span>
      </div>
      <h1 class="login-title">Admin Portal</h1>
      <p class="login-subtitle">Sign in with your authorised Google account to manage app messages.</p>

      <button id="btn-google-login" class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M23.745 12.27c0-.79-.07-1.54-.19-2.27h-11.3v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.86c2.26-2.09 3.56-5.17 3.56-8.82z"/>
          <path fill="#34A853" d="M12.255 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96h-3.98v3.09C3.515 21.3 7.615 24 12.255 24z"/>
          <path fill="#FBBC05" d="M5.525 14.29c-.25-.72-.38-1.49-.38-2.29s.14-1.57.38-2.29V6.62h-3.98a11.86 11.86 0 0 0 0 10.76l3.98-3.09z"/>
          <path fill="#EA4335" d="M12.255 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.205 1.19 15.495 0 12.255 0c-4.64 0-8.74 2.7-10.71 6.62l3.98 3.09c.95-2.85 3.6-4.96 6.73-4.96z"/>
        </svg>
        Sign in with Google
      </button>

      <p id="login-error" class="login-error" hidden></p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js';

    // ── Firebase config ────────────────────────────────────────────────────────
    // Get these values from: Firebase Console → Project Settings → Your apps → Web app
    // If you haven't added a Web app yet, click "Add app" → choose Web.
    const firebaseConfig = {
      apiKey: "REPLACE_WITH_YOUR_API_KEY",
      authDomain: "REPLACE_WITH_YOUR_AUTH_DOMAIN",       // e.g. lunevo-app.firebaseapp.com
      projectId: "REPLACE_WITH_YOUR_PROJECT_ID",          // e.g. lunevo-app
      storageBucket: "REPLACE_WITH_YOUR_STORAGE_BUCKET",
      messagingSenderId: "REPLACE_WITH_YOUR_SENDER_ID",
      appId: "REPLACE_WITH_YOUR_APP_ID",
    };
    // ──────────────────────────────────────────────────────────────────────────

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // If already signed in, go straight to dashboard
    onAuthStateChanged(auth, user => {
      if (user) {
        window.location.href = './dashboard.html';
      }
    });

    document.getElementById('btn-google-login').addEventListener('click', async () => {
      const errorEl = document.getElementById('login-error');
      errorEl.hidden = true;
      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
        // onAuthStateChanged will redirect
      } catch (err) {
        errorEl.textContent = err.message || 'Sign-in failed. Please try again.';
        errorEl.hidden = false;
      }
    });
  </script>
</body>
</html>
